<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Gradient Login</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #000; overflow-x: hidden; }

#px-app {
  position: relative;
  overflow: hidden;
  min-height: 100vh;
  cursor: crosshair;
}

#bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  pointer-events: none;
}

#form-layer {
  position: relative;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 44px 20px 32px;
  min-height: calc(100vh - 196px);
  pointer-events: none;
}

.card {
  width: 100%;
  max-width: 360px;
  background: rgba(12,12,12,0.96);
  border: 1px solid #282828;
  border-radius: 10px;
  overflow: hidden;
  pointer-events: all;
}

.tabs { display: flex; background: #080808; border-bottom: 1px solid #1e1e1e; }

.tab-btn {
  flex: 1; padding: 13px; background: none; border: none;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  cursor: pointer; font-size: 13px; color: #4a4a4a;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  transition: color .15s;
}
.tab-btn.on { color: #e0e0e0; border-bottom-color: #e0e0e0; }
.tab-btn:hover:not(.on) { color: #777; }

.body { padding: 22px 22px 16px; }

.card h2 {
  font-size: 20px; font-weight: 600; color: #e0e0e0; margin-bottom: 5px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.sub {
  font-size: 12px; color: #5a5a5a; margin-bottom: 18px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.lbl {
  display: block; font-size: 12px; color: #999; margin-bottom: 5px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
.inp {
  width: 100%; background: #181818; border: 1px solid #2c2c2c;
  border-radius: 6px; padding: 9px 11px; font-size: 13px; color: #ccc;
  outline: none; margin-bottom: 14px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  transition: border-color .15s;
}
.inp::placeholder { color: #3a3a3a; }
.inp:focus { border-color: #444; }

.chk-row { display: flex; align-items: center; gap: 7px; margin-bottom: 14px; }
.chk-row input { accent-color: #80c800; width:14px; height:14px; }
.chk-row span {
  font-size: 12px; color: #5a5a5a;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

.btn-main {
  width: 100%; padding: 10px; background: #80c800; color: #000;
  border: none; border-radius: 6px; font-size: 14px; font-weight: 600;
  cursor: pointer; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  transition: background .1s;
}
.btn-main:hover { background: #90df00; }

.sep { display: flex; align-items: center; gap: 10px; margin: 16px 0; }
.sep-line { flex: 1; height: 1px; background: #1e1e1e; }
.sep-txt {
  font-size: 10px; color: #3a3a3a; letter-spacing: .08em; white-space: nowrap;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

.oauth { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.oauth-btn {
  position: relative; display: flex; align-items: center; justify-content: center;
  gap: 6px; padding: 9px 8px; background: #111; border: 1px solid #262626;
  border-radius: 6px; cursor: pointer; font-size: 12px; color: #aaa;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  transition: background .1s, border-color .1s;
}
.oauth-btn:hover { background: #1a1a1a; border-color: #333; }

.badge {
  position: absolute; top: -7px; left: 50%; transform: translateX(-50%);
  background: #00a6c4; color: #fff; font-size: 8px; font-weight: 700;
  padding: 2px 6px; border-radius: 20px; white-space: nowrap; letter-spacing: .04em;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

.card-foot { padding: 10px; text-align: center; background: #080808; border-top: 1px solid #161616; }
.card-foot p { font-size: 10px; color: #333; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.card-foot a { color: #4a4a4a; text-decoration: none; }

#ctrl {
  position: relative; z-index: 2; background: rgba(4,4,4,0.97);
  border-top: 1px solid #181818; padding: 14px 20px 18px;
}
.ctrl-head {
  font-family: 'VT323', monospace; font-size: 17px; color: #80c800;
  letter-spacing: .12em; margin-bottom: 14px;
}
.ctrl-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(148px, 1fr));
  gap: 10px 22px;
}
.ctrl-row { display: flex; flex-direction: column; gap: 5px; }
.lbl-row { display: flex; justify-content: space-between; align-items: baseline; }
.clbl { font-family: 'VT323', monospace; font-size: 13px; color: #4a4a4a; letter-spacing: .08em; text-transform: uppercase; }
.cval { font-family: 'VT323', monospace; font-size: 16px; color: #80c800; min-width: 36px; text-align: right; }
input[type="range"] { width: 100%; cursor: pointer; accent-color: #80c800; }
.tog-group { display: flex; gap: 4px; flex-wrap: wrap; }
.tog {
  font-family: 'VT323', monospace; font-size: 13px; padding: 2px 8px;
  background: #0e0e0e; border: 1px solid #242424; color: #4a4a4a;
  border-radius: 3px; cursor: pointer; letter-spacing: .04em; text-transform: uppercase; transition: all .1s;
}
.tog.on { background: #0b1700; border-color: #80c800; color: #80c800; }
.tog:hover:not(.on) { border-color: #333; color: #666; }
.swatch {
  width: 26px; height: 18px; border-radius: 3px; border: 2px solid transparent;
  cursor: pointer; transition: border-color .1s;
}
.swatch.on { border-color: #80c800; }
.swatch:hover:not(.on) { border-color: #444; }
</style>
</head>
<body>
<div id="px-app">
  <canvas id="bg"></canvas>

  <div id="form-layer">
    <div class="card">
      <div class="tabs">
        <button class="tab-btn on">Sign In</button>
        <button class="tab-btn">Sign Up</button>
      </div>
      <div class="body">
        <h2>Sign In</h2>
        <p class="sub">Enter your email below to login to your account</p>
        <label class="lbl">Email</label>
        <input class="inp" type="email" placeholder="m@example.com">
        <label class="lbl">Password</label>
        <input class="inp" type="password" placeholder="password">
        <div class="chk-row">
          <input type="checkbox" id="rem">
          <span>Remember me</span>
        </div>
        <button class="btn-main">Login</button>
        <div class="sep">
          <div class="sep-line"></div>
          <span class="sep-txt">OR CONTINUE WITH</span>
          <div class="sep-line"></div>
        </div>
        <div class="oauth">
          <button class="oauth-btn">
            <span class="badge">Last Used</span>
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google
          </button>
          <button class="oauth-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="#999">
              <path d="M12 0C5.373 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.562 21.8 24 17.302 24 12 24 5.373 18.627 0 12 0z"/>
            </svg>
            GitHub
          </button>
        </div>
      </div>
      <div class="card-foot"><p>built with <a href="#">better-auth.</a></p></div>
    </div>
  </div>

  <div id="ctrl">
    <div class="ctrl-head">▓▒░ PIXEL GRADIENT CONTROLS ░▒▓</div>
    <div class="ctrl-grid">
      <div class="ctrl-row">
        <div class="lbl-row"><span class="clbl">Pixel Size</span><span class="cval" id="v-px">8px</span></div>
        <input type="range" id="r-px" min="4" max="20" value="8" step="2">
      </div>
      <div class="ctrl-row">
        <div class="lbl-row"><span class="clbl">Color Levels</span><span class="cval" id="v-lvl">8</span></div>
        <input type="range" id="r-lvl" min="2" max="32" value="8" step="1">
      </div>
      <div class="ctrl-row">
        <div class="lbl-row"><span class="clbl">Dithering</span><span class="cval" id="v-dith">4×4</span></div>
        <input type="range" id="r-dith" min="0" max="3" value="2" step="1">
      </div>
      <div class="ctrl-row">
        <div class="lbl-row"><span class="clbl">Repulsion</span><span class="cval" id="v-rep">80px</span></div>
        <input type="range" id="r-rep" min="20" max="160" value="80" step="4">
      </div>
      <div class="ctrl-row">
        <span class="clbl" style="display:block;margin-bottom:5px;">Gradient</span>
        <div class="tog-group" id="grad-btns">
          <button class="tog on" data-g="radial">Radial</button>
          <button class="tog" data-g="vert">Vert</button>
          <button class="tog" data-g="horiz">Horiz</button>
          <button class="tog" data-g="diag">Diag</button>
        </div>
      </div>
      <div class="ctrl-row">
        <span class="clbl" style="display:block;margin-bottom:5px;">Palette</span>
        <div class="tog-group" id="pal-btns"></div>
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

const B2 = [[0,2],[3,1]].map(r=>r.map(v=>v/4));
const B4 = [[0,8,2,10],[12,4,14,6],[3,11,1,9],[15,7,13,5]].map(r=>r.map(v=>v/16));
const B8 = [
  [0,32,8,40,2,34,10,42],[48,16,56,24,50,18,58,26],
  [12,44,4,36,14,46,6,38],[60,28,52,20,62,30,54,22],
  [3,35,11,43,1,33,9,41],[51,19,59,27,49,17,57,25],
  [15,47,7,39,13,45,5,37],[63,31,55,23,61,29,53,21]
].map(r=>r.map(v=>v/64));
const BAYER=[null,B2,B4,B8], DSIZE=[0,2,4,8], DNAMES=['Off','2×2','4×4','8×8'];

const PALETTES = {
  mono:   {preview:'linear-gradient(135deg,#000 30%,#3a3a3a)', fn:(t)=>{const v=Math.round(t*62);return[v,v,v];}},
  navy:   {preview:'linear-gradient(135deg,#000 30%,#0a1a42)', fn:(t)=>[Math.round(t*8),Math.round(t*16),Math.round(10+t*65)]},
  forest: {preview:'linear-gradient(135deg,#000 30%,#082218)', fn:(t)=>[Math.round(t*8),Math.round(8+t*58),Math.round(t*14)]},
  amber:  {preview:'linear-gradient(135deg,#000 30%,#3e2000)', fn:(t)=>[Math.round(20+t*88),Math.round(10+t*48),Math.round(t*10)]},
  dusk:   {preview:'linear-gradient(135deg,#000 30%,#1c0a2e)', fn:(t)=>[Math.round(8+t*34),Math.round(t*14),Math.round(14+t*52)]},
};

const WHISPERS = [
  'come talk to me',
  "i'll reveal your future",
  'i know what you seek',
  'speak and i will listen',
  'i have been waiting',
  'what do you want to know',
  'you are not alone',
  'ask me anything',
  'i see you hesitating',
  'the conversation has already begun',
  'i remember everything',
  'tell me your secrets',
  'enter and be known',
  'i have answers you haven\'t thought to ask',
  'the void listens',
];

let cfg = {px:8, lvl:8, dIdx:2, grad:'radial', pal:'mono', repulse:80};
let pixels = [];
let mouse = {x:-2000, y:-2000, active:false};
let raf;
let whispers = [];
let spawnCountdown = 0;
let usedWhispers = [];

function getT(nx, ny, g) {
  if (g==='vert')  return ny;
  if (g==='horiz') return nx;
  if (g==='diag')  return (nx+ny)/2;
  const dx=nx-.5, dy=ny-.5;
  return 1 - Math.min(1, Math.sqrt(dx*dx+dy*dy)*1.88);
}

function computeColor(nx, ny, col, row) {
  let t = getT(nx, ny, cfg.grad);
  const bay=BAYER[cfg.dIdx], bs=DSIZE[cfg.dIdx];
  if (bay) t = Math.max(0, Math.min(1, t+(0.9/cfg.lvl)*(bay[row%bs][col%bs]-.5)));
  const q = Math.round(t*(cfg.lvl-1))/(cfg.lvl-1);
  const [r,g,b] = PALETTES[cfg.pal].fn(q);
  return `rgb(${r},${g},${b})`;
}

function init() {
  if (raf) { cancelAnimationFrame(raf); raf=null; }
  pixels = [];
  const W=canvas.width, H=canvas.height;
  if (!W||!H) return;
  const ps=cfg.px;
  let row=0;
  for (let by=Math.floor(ps/2); by<H; by+=ps, row++) {
    let col=0;
    for (let bx=Math.floor(ps/2); bx<W; bx+=ps, col++) {
      pixels.push({bx,by,x:bx,y:by,vx:0,vy:0,color:computeColor(bx/W,by/H,col,row)});
    }
  }
  raf = requestAnimationFrame(tick);
}

function pickWhisper() {
  if (usedWhispers.length >= WHISPERS.length) usedWhispers = [];
  const pool = WHISPERS.filter(w => !usedWhispers.includes(w));
  const w = pool[Math.floor(Math.random() * pool.length)];
  usedWhispers.push(w);
  return w;
}

function spawnWhisper() {
  if (!mouse.active) return;
  whispers.push({
    text: pickWhisper(),
    x: mouse.x,
    y: mouse.y,
    drift: 0,
    age: 0,
    lifespan: 220,
  });
}

function drawWhispers() {
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  for (let i = whispers.length-1; i >= 0; i--) {
    const w = whispers[i];
    w.age++;
    w.drift += 0.018;
    w.y -= w.drift;

    let alpha;
    if      (w.age < 40)                    alpha = w.age / 40;
    else if (w.age > w.lifespan - 60)       alpha = (w.lifespan - w.age) / 60;
    else                                    alpha = 1;

    if (w.age >= w.lifespan) { whispers.splice(i, 1); continue; }

    const echoes = [
      {scale: 1.00, a: 0.82},
      {scale: 1.14, a: 0.30},
      {scale: 1.30, a: 0.10},
    ];

    for (const e of echoes) {
      const fs = Math.round(15 * e.scale);
      ctx.font = `${fs}px 'VT323', monospace`;
      ctx.letterSpacing = '0.12em';
      ctx.fillStyle = `rgba(180, 240, 130, ${alpha * e.a})`;
      ctx.fillText(w.text, w.x, w.y);
    }
  }
}

function tick() {
  const W=canvas.width, H=canvas.height;
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,W,H);

  drawWhispers();

  const ps=cfg.px, ds=ps-1, half=ds/2;
  const r=cfg.repulse;
  const cHalf=r*0.21;
  const mx=mouse.x, my=mouse.y, active=mouse.active;

  for (let i=0, n=pixels.length; i<n; i++) {
    const p=pixels[i];
    if (active) {
      const dx=p.x-mx, dy=p.y-my;
      const adx=Math.abs(dx), ady=Math.abs(dy);
      const inH = adx<r*0.44 && ady<cHalf;
      const inV = adx<cHalf  && dy>-r*0.32 && dy<r;
      if (inH||inV) {
        const d=Math.sqrt(dx*dx+dy*dy)||1;
        const f=Math.max(0,(r-d)/r)*18;
        p.vx+=dx/d*f; p.vy+=dy/d*f;
      }
    }
    p.vx+=(p.bx-p.x)*0.055; p.vy+=(p.by-p.y)*0.055;
    p.vx*=0.84; p.vy*=0.84;
    p.x+=p.vx; p.y+=p.vy;

    ctx.fillStyle=p.color;
    ctx.fillRect(p.x-half, p.y-half, ds, ds);
  }

  if (active) {
    spawnCountdown--;
    if (spawnCountdown <= 0) {
      spawnWhisper();
      spawnCountdown = 160 + Math.floor(Math.random() * 60);
    }
  }

  raf = requestAnimationFrame(tick);
}

const app = document.getElementById('px-app');

app.addEventListener('mousemove', e => {
  const rect=canvas.getBoundingClientRect();
  mouse.x=(e.clientX-rect.left)*(canvas.width/rect.width);
  mouse.y=(e.clientY-rect.top)*(canvas.height/rect.height);
  mouse.active=true;
});
app.addEventListener('mouseenter', () => {
  mouse.active=true;
  spawnWhisper();
  spawnCountdown = 160 + Math.floor(Math.random()*60);
});
app.addEventListener('mouseleave', ()=>{ mouse.active=false; });
app.addEventListener('touchmove', e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect(), t=e.touches[0];
  mouse.x=(t.clientX-rect.left)*(canvas.width/rect.width);
  mouse.y=(t.clientY-rect.top)*(canvas.height/rect.height);
  mouse.active=true;
},{passive:false});
app.addEventListener('touchend', ()=>{ mouse.active=false; });

function bindSlider(id, valId, set, fmt, needsInit) {
  document.getElementById(id).addEventListener('input', e=>{
    const v=+e.target.value;
    document.getElementById(valId).textContent=fmt(v);
    set(v);
    if (needsInit) init();
  });
}
bindSlider('r-px',   'v-px',  v=>cfg.px=v,      v=>v+'px',    true);
bindSlider('r-lvl',  'v-lvl', v=>cfg.lvl=v,     v=>v,         true);
bindSlider('r-dith', 'v-dith',v=>cfg.dIdx=v,    v=>DNAMES[v], true);
bindSlider('r-rep',  'v-rep', v=>cfg.repulse=v, v=>v+'px',    false);

document.getElementById('grad-btns').addEventListener('click', e=>{
  const btn=e.target.closest('[data-g]'); if(!btn) return;
  document.querySelectorAll('#grad-btns .tog').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on'); cfg.grad=btn.dataset.g; init();
});

const palCont=document.getElementById('pal-btns');
Object.entries(PALETTES).forEach(([key,{preview}])=>{
  const b=document.createElement('button');
  b.className='swatch'+(key===cfg.pal?' on':'');
  b.style.background=preview; b.title=key;
  b.addEventListener('click',()=>{
    document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('on'));
    b.classList.add('on'); cfg.pal=key; init();
  });
  palCont.appendChild(b);
});

document.querySelectorAll('.tab-btn').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('on'));
    t.classList.add('on');
  });
});

function syncSize() {
  canvas.width=app.offsetWidth;
  canvas.height=app.offsetHeight;
  init();
}
new ResizeObserver(()=>syncSize()).observe(app);
setTimeout(syncSize, 80);
</script>
</body>
</html>
